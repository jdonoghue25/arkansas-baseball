<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arkansas Baseball 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>

/* ── Reset & Tokens ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:       #CC0000;
  --red-soft:  #fff0f0;
  --red-mid:   #ffd5d5;

  /* Light */
  --bg:        #f2f3f5;
  --surface:   #ffffff;
  --surface2:  #f8f9fa;
  --border:    #e8eaed;
  --text:      #0f1111;
  --text2:     #555d6b;
  --text3:     #8d97a5;
  --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,.09);

  --win:       #0b6e31;
  --win-bg:    #e8f5ec;
  --loss:      #b12704;
  --loss-bg:   #fdecea;
  --upcoming:  #0066c0;
  --upcoming-bg:#ebf3fd;

  --radius:    10px;
  --font:      'Outfit', sans-serif;
}

[data-theme="dark"] {
  --bg:        #0d0f14;
  --surface:   #161a24;
  --surface2:  #1e2330;
  --border:    #272d3d;
  --text:      #e8eaf0;
  --text2:     #9ba3b5;
  --text3:     #5a6275;
  --shadow:    0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,.5);

  --win:       #2ecc71;
  --win-bg:    rgba(46,204,113,.1);
  --loss:      #e74c3c;
  --loss-bg:   rgba(231,76,60,.1);
  --upcoming:  #5b9bd5;
  --upcoming-bg:rgba(91,155,213,.1);

  --red-soft:  rgba(204,0,0,.12);
  --red-mid:   rgba(204,0,0,.2);
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background .2s, color .2s;
}

/* ── Header ─────────────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
  position: sticky;
  top: 0;
  z-index: 200;
}

.header-inner {
  max-width: 680px;
  margin: 0 auto;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-mark {
  width: 36px;
  height: 36px;
  background: var(--red);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.logo-mark svg {
  width: 20px;
  height: 20px;
  fill: white;
}

.header-title {
  flex: 1;
}

.header-title h1 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
  letter-spacing: -.2px;
}

.header-title p {
  font-size: 12px;
  color: var(--text3);
  font-weight: 400;
  margin-top: 1px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.record-chip {
  background: var(--red-soft);
  border: 1px solid var(--red-mid);
  color: var(--red);
  font-size: 13px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 100px;
  white-space: nowrap;
}

.theme-toggle {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: background .15s;
  flex-shrink: 0;
}

.theme-toggle:hover { background: var(--border); }

/* ── Stats Strip ────────────────────────────────────── */
.stats-strip {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.stats-strip::-webkit-scrollbar { display: none; }

.stats-inner {
  max-width: 680px;
  margin: 0 auto;
  padding: 10px 16px;
  display: flex;
  gap: 0;
  min-width: max-content;
}

.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 18px;
  border-right: 1px solid var(--border);
}

.stat:last-child { border-right: none; }
.stat:first-child { padding-left: 0; }

.stat-val {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
  letter-spacing: -.5px;
}

.stat-val.positive { color: var(--win); }
.stat-val.negative { color: var(--loss); }

.stat-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-top: 3px;
}

/* ── Filters ────────────────────────────────────────── */
.filters-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.filters-wrap::-webkit-scrollbar { display: none; }

.filters-inner {
  max-width: 680px;
  margin: 0 auto;
  padding: 10px 16px;
  display: flex;
  gap: 6px;
  min-width: max-content;
}

.pill {
  padding: 6px 14px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}

.pill:hover { border-color: var(--text3); color: var(--text); }

.pill.active {
  background: var(--text);
  border-color: var(--text);
  color: var(--surface);
}

/* ── Main Content ───────────────────────────────────── */
.content {
  max-width: 680px;
  margin: 0 auto;
  padding: 20px 16px 80px;
}

/* ── Upcoming Hero ──────────────────────────────────── */
.section-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
  padding-left: 2px;
}

.upcoming-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 6px;
}

.upcoming-hero-top {
  background: var(--red);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.upcoming-hero-top .label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,.8);
}

.live-dot {
  width: 7px;
  height: 7px;
  background: white;
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .5; transform: scale(.8); }
}

.upcoming-hero-body {
  padding: 18px 16px 16px;
}

.upcoming-matchup {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.team-block { text-align: center; }

.team-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}

.team-record {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
}

.vs-block { text-align: center; }

.vs-time {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  color: var(--red);
  line-height: 1;
}

.vs-date {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
}

.upcoming-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.meta-chip {
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 100px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
}

.meta-chip.home { background: var(--red-soft); border-color: var(--red-mid); color: var(--red); }
.meta-chip.sec { background: var(--upcoming-bg); border-color: transparent; color: var(--upcoming); }

/* ── Upcoming Small Cards ───────────────────────────── */
.upcoming-small {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 13px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 6px;
  cursor: default;
  transition: box-shadow .15s;
}

.upcoming-small:hover { box-shadow: var(--shadow-md); }

.upcoming-date-col {
  text-align: center;
  min-width: 36px;
}

.up-day { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; }
.up-num { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1; letter-spacing: -1px; }
.up-month { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; }

.upcoming-opp {
  flex: 1;
  min-width: 0;
}

.up-opp-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  gap: 6px;
}

.rank-badge {
  font-size: 11px;
  font-weight: 700;
  color: white;
  background: #b8860b;
  padding: 1px 5px;
  border-radius: 4px;
  flex-shrink: 0;
}

.up-meta {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
  display: flex;
  gap: 6px;
}

.up-time-col {
  text-align: right;
  flex-shrink: 0;
}

.up-time {
  font-size: 14px;
  font-weight: 700;
  color: var(--upcoming);
}

.up-loc {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}

/* ── Section Divider ────────────────────────────────── */
.section-gap { margin-top: 24px; }

/* ── Results ────────────────────────────────────────── */
.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 12px 16px;
  display: grid;
  grid-template-columns: 42px 1fr auto;
  gap: 12px;
  align-items: center;
  margin-bottom: 5px;
  cursor: default;
  transition: box-shadow .15s;
  text-decoration: none;
  position: relative;
}

.result-card:hover { box-shadow: var(--shadow-md); }
.result-card[href]:hover { cursor: pointer; }

.result-card::after {
  content: '';
  position: absolute;
  left: 0; top: 12px; bottom: 12px;
  width: 3px;
  border-radius: 0 2px 2px 0;
}

.result-card.win::after { background: var(--win); }
.result-card.loss::after { background: var(--loss); }
.result-card.canceled::after { background: var(--border); }

/* Date col */
.r-date { text-align: center; }
.r-day { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; }
.r-num { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1; letter-spacing: -1px; }
.r-mon { font-size: 10px; color: var(--text3); text-transform: uppercase; font-weight: 500; }

/* Info col */
.r-info { min-width: 0; }

.r-opp {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
}

.loc-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .5px;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
}

.loc-tag.home { background: var(--red-soft); color: var(--red); }
.loc-tag.away { background: var(--upcoming-bg); color: var(--upcoming); }
.loc-tag.neutral { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }

.sec-tag {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  background: var(--surface2);
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid var(--border);
  flex-shrink: 0;
}

.r-sub {
  font-size: 11px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 5px;
}

.r-sub .dot { color: var(--border); }

/* Score col */
.r-score { text-align: right; flex-shrink: 0; }

.result-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .5px;
  padding: 2px 8px;
  border-radius: 100px;
  margin-bottom: 3px;
}

.result-badge.W { background: var(--win-bg); color: var(--win); }
.result-badge.L { background: var(--loss-bg); color: var(--loss); }
.result-badge.C { background: var(--surface2); color: var(--text3); }

.score-num {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -1px;
  line-height: 1;
}

.score-sub {
  font-size: 10px;
  color: var(--text3);
  margin-top: 1px;
}

/* Month label */
.month-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  padding: 10px 2px 6px;
  letter-spacing: .3px;
}

/* Empty */
.empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--text3);
  font-size: 14px;
}

/* Updated timestamp */
.updated {
  text-align: center;
  font-size: 11px;
  color: var(--text3);
  padding: 20px 0 8px;
}

/* Loading */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
  font-size: 14px;
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.upcoming-hero, .upcoming-small, .result-card {
  animation: fadeUp .25s ease both;
}

</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-inner">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <div class="header-title">
      <h1>Arkansas Baseball</h1>
      <p>2025–26 Season</p>
    </div>
    <div class="header-right">
      <div class="record-chip" id="header-record">–</div>
      <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>
    </div>
  </div>
</header>

<!-- ── Stats Strip ── -->
<div class="stats-strip">
  <div class="stats-inner">
    <div class="stat">
      <div class="stat-val" id="s-overall">–</div>
      <div class="stat-label">Overall</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s-sec">–</div>
      <div class="stat-label">SEC</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s-home">–</div>
      <div class="stat-label">Home</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s-away">–</div>
      <div class="stat-label">Away</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s-diff">–</div>
      <div class="stat-label">Run Diff</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s-streak">–</div>
      <div class="stat-label">Streak</div>
    </div>
  </div>
</div>

<!-- ── Filters ── -->
<div class="filters-wrap">
  <div class="filters-inner">
    <button class="pill active" onclick="setFilter('all',this)">All</button>
    <button class="pill" onclick="setFilter('upcoming',this)">Upcoming</button>
    <button class="pill" onclick="setFilter('W',this)">Wins</button>
    <button class="pill" onclick="setFilter('L',this)">Losses</button>
    <button class="pill" onclick="setFilter('Home',this)">Home</button>
    <button class="pill" onclick="setFilter('Away',this)">Away</button>
    <button class="pill" onclick="setFilter('sec',this)">SEC</button>
  </div>
</div>

<!-- ── Content ── -->
<div class="content" id="content">
  <div class="loading">Loading schedule…</div>
</div>

<script>
/* ── State ── */
let GAMES = [];
let META  = {};
let activeFilter = 'all';
let theme = localStorage.getItem('theme') || 'light';

/* ── Theme ── */
function toggleTheme() {
  theme = theme === 'light' ? 'dark' : 'light';
  applyTheme();
  localStorage.setItem('theme', theme);
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-btn').textContent = theme === 'light' ? '🌙' : '☀️';
}

applyTheme();

/* ── Load Data ── */
async function loadData() {
  try {
    const res = await fetch('./arkansas_schedule.json?t=' + Date.now());
    const data = await res.json();
    GAMES = data.games || [];
    META  = { ...(data.summary || data.stats || {}), last_updated: data.last_updated };
    renderStats();
    renderContent();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="empty">Could not load schedule data.<br>Check that arkansas_schedule.json exists.</div>';
  }
}

/* ── Stats ── */
function renderStats() {
  const played = GAMES.filter(g => g.result === 'W' || g.result === 'L');
  const W = played.filter(g => g.result === 'W').length;
  const L = played.filter(g => g.result === 'L').length;
  const secP = played.filter(g => g.is_conference);
  const sW = secP.filter(g => g.result === 'W').length;
  const sL = secP.filter(g => g.result === 'L').length;
  const hP = played.filter(g => g.location_type === 'Home');
  const hW = hP.filter(g => g.result === 'W').length;
  const hL = hP.filter(g => g.result === 'L').length;
  const aP = played.filter(g => g.location_type === 'Away');
  const aW = aP.filter(g => g.result === 'W').length;
  const aL = aP.filter(g => g.result === 'L').length;
  const rf = played.reduce((a,g) => a + (g.ark_score||0), 0);
  const ra = played.reduce((a,g) => a + (g.opp_score||0), 0);
  const diff = rf - ra;

  // Streak
  let streak = '–';
  const rev = [...played].reverse();
  if (rev.length) {
    let last = rev[0].result, cnt = 0;
    for (const g of rev) { if (g.result === last) cnt++; else break; }
    streak = last + cnt;
  }

  document.getElementById('header-record').textContent = `${W}–${L}`;
  document.getElementById('s-overall').textContent = `${W}–${L}`;
  document.getElementById('s-sec').textContent = `${sW}–${sL}`;
  document.getElementById('s-home').textContent = `${hW}–${hL}`;
  document.getElementById('s-away').textContent = `${aW}–${aL}`;

  const diffEl = document.getElementById('s-diff');
  diffEl.textContent = (diff >= 0 ? '+' : '') + diff;
  diffEl.className = 'stat-val ' + (diff > 0 ? 'positive' : diff < 0 ? 'negative' : '');

  const strEl = document.getElementById('s-streak');
  strEl.textContent = streak;
  if (streak.startsWith('W')) strEl.className = 'stat-val positive';
  else if (streak.startsWith('L')) strEl.className = 'stat-val negative';
}

/* ── Filter ── */
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderContent();
}

function filtered() {
  return GAMES.filter(g => {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'upcoming') return g.result === 'Upcoming';
    if (activeFilter === 'W') return g.result === 'W';
    if (activeFilter === 'L') return g.result === 'L';
    if (activeFilter === 'Home') return g.location_type === 'Home';
    if (activeFilter === 'Away') return g.location_type === 'Away';
    if (activeFilter === 'sec') return g.is_conference;
    return true;
  });
}

/* ── Render ── */
function renderContent() {
  const games = filtered();
  const upcoming = games.filter(g => g.result === 'Upcoming');
  const results  = games.filter(g => g.result !== 'Upcoming');
  let html = '';

  /* Upcoming section */
  if (upcoming.length && (activeFilter === 'all' || activeFilter === 'upcoming' || activeFilter === 'Home' || activeFilter === 'Away' || activeFilter === 'sec')) {
    html += `<div class="section-label">Upcoming Games</div>`;
    const [next, ...rest] = upcoming;

    /* Hero card */
    const rankStr = next.opponent_rank ? `<span class="rank-badge">#${next.opponent_rank}</span>` : '';
    const locCls = next.location_type === 'Home' ? 'home' : '';
    const secStr = next.is_conference ? `<span class="meta-chip sec">SEC</span>` : '';
    html += `
      <div class="upcoming-hero" style="animation-delay:.05s">
        <div class="upcoming-hero-top">
          <span class="label">Next Game</span>
          <div class="live-dot"></div>
        </div>
        <div class="upcoming-hero-body">
          <div class="upcoming-matchup">
            <div class="team-block">
              <div class="team-name">Arkansas</div>
              <div class="team-record" id="ark-record">–</div>
            </div>
            <div class="vs-block">
              <div class="vs-time">${next.time_ct || 'TBD'}</div>
              <div class="vs-date">${next.day_of_week || ''} · ${shortDate(next.game_date)}</div>
            </div>
            <div class="team-block">
              <div class="team-name" style="display:flex;align-items:center;gap:5px;justify-content:center">${rankStr}${cleanOpp(next.opponent)}</div>
              <div class="team-record">${next.city || ''}</div>
            </div>
          </div>
          <div class="upcoming-meta">
            <span class="meta-chip ${locCls}">${next.location_type}</span>
            ${secStr}
            ${next.series_name ? `<span class="meta-chip">${next.series_name}</span>` : ''}
          </div>
        </div>
      </div>`;

    /* Remaining upcoming */
    rest.forEach((g, i) => {
      const rk = g.opponent_rank ? `<span class="rank-badge">#${g.opponent_rank}</span>` : '';
      const lc = (g.location_type || '').toLowerCase();
      html += `
        <div class="upcoming-small" style="animation-delay:${.1 + i*.04}s">
          <div class="upcoming-date-col">
            <div class="up-day">${g.day_of_week || ''}</div>
            <div class="up-num">${dayNum(g.game_date)}</div>
            <div class="up-month">${monthStr(g.game_date)}</div>
          </div>
          <div class="upcoming-opp">
            <div class="up-opp-name">${rk}${cleanOpp(g.opponent)}</div>
            <div class="up-meta">
              <span>${g.location_type}</span>
              <span>·</span>
              <span>${g.city || ''}</span>
              ${g.is_conference ? '<span>·</span><span style="color:var(--upcoming)">SEC</span>' : ''}
            </div>
          </div>
          <div class="up-time-col">
            <div class="up-time">${g.time_ct || 'TBD'}</div>
            <div class="up-loc">${monthStr(g.game_date)} ${dayNum(g.game_date)}</div>
          </div>
        </div>`;
    });
  }

  /* Results section */
  if (results.length) {
    if (upcoming.length && html) {
      html += `<div class="section-gap"></div>`;
    }
    html += `<div class="section-label">Results</div>`;

    const months = [...new Set(results.map(g => monthStr(g.game_date)))];
    const MONTH_ORDER = ['Feb','Mar','Apr','May','Jun'];
    months.sort((a,b) => MONTH_ORDER.indexOf(b) - MONTH_ORDER.indexOf(a));

    months.forEach(month => {
      const mg = results.filter(g => monthStr(g.game_date) === month);
      html += `<div class="month-label">${fullMonth(month)}</div>`;
      mg.reverse().forEach((g, i) => {
        const rc = g.result === 'W' ? 'win' : g.result === 'L' ? 'loss' : 'canceled';
        const rb = g.result === 'W' ? 'W' : g.result === 'L' ? 'L' : 'C';
        const rk = g.opponent_rank ? `<span class="rank-badge">#${g.opponent_rank}</span>` : '';
        const lc = (g.location_type || '').toLowerCase();
        const sc = g.is_conference ? `<span class="sec-tag">SEC</span>` : '';
        const inn = g.innings ? ` (${g.innings})` : '';
        const scoreHtml = (g.result === 'W' || g.result === 'L')
          ? `<div class="score-num">${g.ark_score}–${g.opp_score}</div><div class="score-sub">ARK–OPP${inn}</div>`
          : `<div class="score-sub" style="color:var(--text3);font-size:12px">Canceled</div>`;
        const href = g.recap_url ? `href="${g.recap_url}" target="_blank"` : '';
        html += `
          <a class="result-card ${rc}" ${href} style="animation-delay:${i*.03}s">
            <div class="r-date">
              <div class="r-day">${g.day_of_week||''}</div>
              <div class="r-num">${dayNum(g.game_date)}</div>
              <div class="r-mon">${monthStr(g.game_date)}</div>
            </div>
            <div class="r-info">
              <div class="r-opp">
                <span class="loc-tag ${lc}">${g.location_type}</span>
                ${rk}${cleanOpp(g.opponent)}${sc}
              </div>
              <div class="r-sub">
                <span>${g.city||''}</span>
                ${g.series_name ? `<span class="dot">·</span><span>${g.series_name}</span>` : ''}
              </div>
            </div>
            <div class="r-score">
              <span class="result-badge ${rb}">${rb === 'C' ? 'CXLD' : rb}</span>
              ${scoreHtml}
            </div>
          </a>`;
      });
    });
  }

  /* Empty */
  if (!html) {
    html = '<div class="empty">No games match this filter.</div>';
  }

  /* Timestamp */
  if (META.last_updated) {
    const d = new Date(META.last_updated);
    html += `<div class="updated">Last updated ${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})} at ${d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</div>`;
  }

  document.getElementById('content').innerHTML = html;

  /* Set ark record in hero */
  const played = GAMES.filter(g => g.result==='W'||g.result==='L');
  const W = played.filter(g=>g.result==='W').length;
  const L = played.filter(g=>g.result==='L').length;
  const el = document.getElementById('ark-record');
  if (el) el.textContent = `${W}–${L}`;
}

/* ── Helpers ── */
function cleanOpp(s) {
  return (s||'').replace(/\s*\[DH-\d\]/i,'').trim();
}

function dayNum(dateStr) {
  if (!dateStr) return '';
  const m = dateStr.match(/(\d{1,2}),/);
  return m ? m[1] : '';
}

function monthStr(dateStr) {
  if (!dateStr) return '';
  const m = dateStr.match(/^([A-Za-z]+)/);
  return m ? m[1] : '';
}

function shortDate(dateStr) {
  if (!dateStr) return '';
  const parts = dateStr.replace(',','').split(' ');
  return parts.slice(0,2).join(' ');
}

const FULL_MONTHS = {Feb:'February',Mar:'March',Apr:'April',May:'May',Jun:'June',Jan:'January'};
function fullMonth(s) { return FULL_MONTHS[s] || s; }

/* ── Init ── */
loadData();
</script>
</body>
</html>
