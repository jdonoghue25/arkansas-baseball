<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEC Baseball 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f2f2;--surface:#fff;--surface2:#f8f9fa;
  --border:#e3e6e6;--text:#0f1111;--text2:#565959;--text3:#8d97a5;
  --hdr-bg:#131921;--hdr-sub:#1a2332;
  --win:#0b6e31;--loss:#b12704;
  --radius:8px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}
[data-theme="dark"]{
  --bg:#0d0f14;--surface:#161a24;--surface2:#1e2330;
  --border:#272d3d;--text:#e8eaf0;--text2:#9ba3b5;--text3:#5a6275;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:13px;}

/* Header */
.hdr{background:var(--hdr-bg);border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;z-index:100;}
.hdr-inner{max-width:1240px;margin:0 auto;padding:0 20px;height:54px;display:flex;align-items:center;gap:14px;}
.logo-mark{width:32px;height:32px;background:#CC0000;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.site-title h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px;}
.site-title p{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.updated-badge{font-size:11px;color:rgba(255,255,255,.35);}
.icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.14);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .15s;}
.icon-btn:hover{background:rgba(255,255,255,.1);}

/* Sub header */
.sub-hdr{background:var(--hdr-sub);border-bottom:1px solid rgba(0,0,0,.25);padding:10px 20px;}
.sub-inner{max-width:1240px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.sub-inner h2{font-size:13px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.5px;}
.sort-btns{display:flex;gap:6px;}
.sort-btn{padding:3px 10px;border-radius:100px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.5);font-family:var(--font);font-size:11px;cursor:pointer;transition:all .15s;}
.sort-btn:hover{border-color:rgba(255,255,255,.5);color:#fff;}
.sort-btn.active{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4);color:#fff;}

/* Grid */
.page{max-width:1240px;margin:0 auto;padding:20px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}

/* Team card */
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0;cursor:pointer;transition:box-shadow .15s,transform .1s;text-decoration:none;display:block;color:var(--text);overflow:hidden;}
.team-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);transform:translateY(-2px);}
.card-top{height:4px;background:var(--tc);}
.card-body{padding:14px;}
.card-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.card-logo{width:36px;height:36px;object-fit:contain;flex-shrink:0;}
.card-logo-placeholder{width:36px;height:36px;background:var(--tc);border-radius:50%;opacity:.2;}
.card-team-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.2;}
.card-conf{font-size:10px;color:var(--text3);margin-top:1px;}
.card-record{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1;}
.card-record-row{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;}
.card-sec{font-size:12px;color:var(--text2);}
.card-streak{font-size:11px;font-weight:700;padding:1px 7px;border-radius:100px;}
.card-streak.W{background:rgba(11,110,49,.12);color:#0b6e31;}
.card-streak.L{background:rgba(177,39,4,.1);color:#b12704;}
[data-theme="dark"] .card-streak.W{background:rgba(46,204,113,.1);color:#2ecc71;}
[data-theme="dark"] .card-streak.L{background:rgba(231,76,60,.1);color:#e74c3c;}
.card-next{border-top:1px solid var(--border);margin:0 -14px;padding:8px 14px 0;}
.card-next-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:3px;}
.card-next-game{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-next-game strong{color:var(--text);font-weight:600;}
.card-rank{font-size:10px;font-weight:700;color:#fff;background:#b8860b;padding:1px 5px;border-radius:3px;margin-right:3px;}

.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:15px;}
.loading{text-align:center;padding:60px 20px;color:var(--text3);}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.animate{animation:fadeIn .25s ease both;}

@media(max-width:960px){.grid{grid-template-columns:repeat(3,1fr);}.page{padding:14px;}}
@media(max-width:640px){.grid{grid-template-columns:repeat(2,1fr);}.hdr-inner{padding:0 12px;}.sub-hdr{padding:10px 12px;}.page{padding:12px;}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <div class="logo-mark">⚾</div>
    <div class="site-title">
      <h1>SEC Baseball</h1>
      <p>2026 Season</p>
    </div>
    <div class="hdr-right">
      <a href="live.html" id="live-nav-btn" style="display:none;align-items:center;gap:6px;background:rgba(204,0,0,.2);border:1px solid rgba(204,0,0,.4);border-radius:100px;padding:3px 10px;text-decoration:none;font-size:11px;font-weight:700;color:#ff9090;text-transform:uppercase;letter-spacing:.8px;">
        <span style="width:6px;height:6px;background:#ff4444;border-radius:50%;animation:blink 1.4s infinite;display:inline-block;"></span>
        Live
      </a>
      <span class="updated-badge" id="updated-badge"></span>
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
    </div>
  </div>
</header>

<div class="sub-hdr">
  <div class="sub-inner">
    <h2>ALL TEAMS</h2>
    <div class="sort-btns">
      <button class="sort-btn active" onclick="setSort('sec',this)">SEC Record</button>
      <button class="sort-btn" onclick="setSort('overall',this)">Overall</button>
      <button class="sort-btn" onclick="setSort('alpha',this)">A–Z</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="grid" id="grid"><div class="loading">Loading…</div></div>
</div>

<script>
let TEAMS=[];
let sortMode='sec';
let theme=localStorage.getItem('theme')||'light';

function toggleTheme(){
  theme=theme==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',theme);
  document.getElementById('theme-btn').textContent=theme==='light'?'🌙':'☀️';
  localStorage.setItem('theme',theme);
}
document.documentElement.setAttribute('data-theme',theme);
document.getElementById('theme-btn').textContent=theme==='light'?'🌙':'☀️';

function setSort(mode,btn){
  sortMode=mode;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function winPct(rec){
  if(!rec)return -1;
  const [w,l]=(rec+'-0').split('-').map(Number);
  return (w+l)>0?w/(w+l):-1;
}

function sorted(){
  const t=[...TEAMS];
  if(sortMode==='sec') t.sort((a,b)=>winPct(b.sec_record)-winPct(a.sec_record)||winPct(b.record)-winPct(a.record));
  else if(sortMode==='overall') t.sort((a,b)=>winPct(b.record)-winPct(a.record));
  else t.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  return t;
}

function nextLabel(ng){
  if(!ng) return 'No upcoming games';
  const rk=ng.opponent_rank?`<span class="card-rank">#${ng.opponent_rank}</span>`:'';
  const loc=ng.location_type==='Away'?'@':ng.location_type==='Neutral'?'N·':'vs';
  const dt=(ng.game_date||'').replace(', 2026','').replace(',','');
  const tm=ng.time_ct?` · ${ng.time_ct}`:'';
  return `${loc} ${rk}<strong>${ng.opponent||'TBD'}</strong> <span style="color:var(--text3)">${dt}${tm}</span>`;
}

function streakClass(s){return s&&s[0]==='W'?'W':s&&s[0]==='L'?'L':'';}

function cardHtml(t,i){
  const color='#'+t.color;
  const logo=t.logo?`<img class="card-logo" src="${t.logo}" alt="${t.name}" loading="lazy">`
                   :`<div class="card-logo-placeholder"></div>`;
  const streak=t.streak&&t.streak!=='N/A'
    ?`<span class="card-streak ${streakClass(t.streak)}">${t.streak}</span>`:'';
  const ng=nextLabel(t.next_game);
  return `<a class="team-card animate" href="team.html?team=${t.slug}" style="--tc:${color}" style="animation-delay:${i*0.03}s">
    <div class="card-top"></div>
    <div class="card-body">
      <div class="card-head">${logo}<div><div class="card-team-name">${t.name}</div><div class="card-conf">SEC · ${t.abbr}</div></div></div>
      <div class="card-record-row">
        <div class="card-record">${t.record||'–'}</div>
        <div class="card-sec">SEC ${t.sec_record||'–'}</div>
        ${streak}
      </div>
      <div class="card-next">
        <div class="card-next-label">Next</div>
        <div class="card-next-game">${ng}</div>
      </div>
    </div>
  </a>`;
}

function render(){
  const teams=sorted();
  document.getElementById('grid').innerHTML=teams.map((t,i)=>cardHtml(t,i)).join('');
}

async function loadData(){
  try{
    const r=await fetch('./data/sec.json?t='+Date.now());
    const d=await r.json();
    TEAMS=d.teams||[];
    if(d.last_updated){
      const dt=new Date(d.last_updated);
      document.getElementById('updated-badge').textContent=
        'Updated '+dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})+
        ' '+dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    }
    render();
  }catch(e){
    document.getElementById('grid').innerHTML='<div class="empty">Could not load data.</div>';
  }
}
loadData();

// Show LIVE button in header only when a game is actually in progress
async function checkLiveStatus(){
  try{
    const r=await fetch('./data/live_game.json?_='+Date.now());
    if(!r.ok)return;
    const d=await r.json();
    if(d.status==='live'&&d.last_updated){
      const age=(Date.now()-new Date(d.last_updated).getTime())/1000;
      if(age<600){
        document.getElementById('live-nav-btn').style.display='flex';
        return;
      }
    }
  }catch(e){}
  document.getElementById('live-nav-btn').style.display='none';
}
checkLiveStatus();
</script>
</body>
</html>
